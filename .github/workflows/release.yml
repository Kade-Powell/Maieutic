name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    outputs:
      package_version: ${{ steps.release_metadata.outputs.package_version }}
      vsix_path: ${{ steps.release_metadata.outputs.vsix_path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        id: release_metadata
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"
          vsix_path="${package_name}-${package_version}.vsix"

          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} must match package version ${expected_tag}."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Release tag must point to a commit on main."
            exit 1
          fi

          echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"
          echo "VSIX_PATH=${vsix_path}" >> "${GITHUB_ENV}"
          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "vsix_path=${vsix_path}" >> "${GITHUB_OUTPUT}"

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Test extension
        run: xvfb-run -a npm test

      - name: Package VSIX
        run: npx --no-install vsce package --out "${VSIX_PATH}"

      - name: Preserve release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maieutic-${{ env.PACKAGE_VERSION }}
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${VSIX_PATH}" \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" "${VSIX_PATH}" \
              --verify-tag \
              --generate-notes \
              --title "Maieutic ${PACKAGE_VERSION}" \
              --repo "${GITHUB_REPOSITORY}"
          fi

  marketplace:
    name: Publish to VS Code Marketplace
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: marketplace
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: maieutic-${{ needs.release.outputs.package_version }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Log in to Microsoft Entra
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Identify Marketplace publisher identity
        env:
          AZURE_CORE_OUTPUT: none
        shell: bash
        run: |
          profile_id="$(
            az rest \
              --method get \
              --url "https://app.vssps.visualstudio.com/_apis/profile/profiles/me" \
              --resource "499b84ac-1321-427f-aa17-267ca6975798" \
              --query id \
              --output tsv
          )"

          if [[ -z "${profile_id}" ]]; then
            echo "::error::Microsoft Entra did not return a Marketplace identity profile."
            exit 1
          fi

          echo "Marketplace identity profile: ${profile_id}"

      - name: Verify Marketplace publisher access
        env:
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        run: npx --yes @vscode/vsce@3.9.2 verify-pat --azure-credential TenGallonTechnology

      - name: Publish extension
        env:
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        run: npx --yes @vscode/vsce@3.9.2 publish --azure-credential --skip-duplicate --packagePath "${{ needs.release.outputs.vsix_path }}"
