name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish extension
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"

          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} must match package version ${expected_tag}."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Release tag must point to a commit on main."
            exit 1
          fi

          echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"
          echo "VSIX_PATH=${package_name}-${package_version}.vsix" >> "${GITHUB_ENV}"

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Test extension
        run: xvfb-run -a npm test

      - name: Package VSIX
        run: npx --no-install vsce package --out "${VSIX_PATH}"

      - name: Preserve release artifact
        uses: actions/upload-artifact@v4
        with:
          name: maieutic-${{ env.PACKAGE_VERSION }}
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${VSIX_PATH}" \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" "${VSIX_PATH}" \
              --verify-tag \
              --generate-notes \
              --title "Maieutic ${PACKAGE_VERSION}" \
              --repo "${GITHUB_REPOSITORY}"
          fi

      - name: Detect Marketplace credentials
        id: marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          if [[ -n "${VSCE_PAT}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::VSCE_PAT is not configured; the GitHub Release is complete and Marketplace publication was skipped."
          fi

      - name: Publish to VS Code Marketplace
        if: steps.marketplace.outputs.enabled == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --no-install vsce publish --skip-duplicate --packagePath "${VSIX_PATH}"
